<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rewoven</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 72px 28px 80px; gap: 28px;
    }
    .hero::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 500px;
      background: radial-gradient(ellipse at center top, rgba(59,142,234,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: -1;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border: 1px solid var(--border); border-radius: 999px;
      background: rgba(59,142,234,0.06); font-size: 13px; font-weight: 500;
      color: var(--blue); animation: fadeUp 0.6s ease both;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--blue); box-shadow: 0 0 6px var(--blue);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(38px, 9vw, 56px); line-height: 1.1;
      letter-spacing: -1px; color: #fff; animation: fadeUp 0.6s 0.1s ease both;
    }
    h1 .accent { color: var(--blue); display: block; }
    .hero-sub {
      font-size: 16px; line-height: 1.7; color: var(--muted);
      max-width: 380px; animation: fadeUp 0.6s 0.2s ease both;
    }
    .search-box {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px;
      padding: 14px 16px 10px; display: flex; flex-direction: column;
      gap: 10px; animation: fadeUp 0.6s 0.3s ease both;
    }
    .search-input-row { display: flex; align-items: center; gap: 10px; }
    .search-input-row svg { flex-shrink: 0; color: var(--muted); }
    .search-input-row input {
      background: transparent; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); width: 100%;
    }
    .search-input-row input::placeholder { color: var(--muted); }
    .btn-buscar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px; background: var(--blue); border: none;
      border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-buscar:hover { background: var(--blue-dark); }
    .btn-buscar:active { transform: scale(0.98); }
    .btn-mapa {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; background: rgba(59,142,234,0.08);
      border: 1px solid var(--border); border-radius: 999px; color: var(--blue);
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s; animation: fadeUp 0.6s 0.4s ease both;
    }
    .btn-mapa:hover { background: rgba(59,142,234,0.15); }
    .btn-mapa:active { transform: scale(0.98); }
    .btn-mapa svg { transition: transform 0.2s; }
    .btn-mapa:hover svg { transform: translateX(3px); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 0 0-8 8H2l3.5 3.5L9 12H7a5 5 0 0 1 5-5c1.38 0 2.63.56 3.54 1.46L17.65 6.35zM12 19a5 5 0 0 1-5-5c0-1.38.56-2.63 1.46-3.54L6.35 8.35A7.96 7.96 0 0 0 4 14a8 8 0 0 0 8 8 7.97 7.97 0 0 0 5.65-2.35l-1.42-1.42A5.01 5.01 0 0 1 12 19zm8-9h-2l-3.5-3.5L11 10h2a7 7 0 0 1 .01 0h.99v.01L15 8l3.5 3.5L22 14h-2v.01A8.003 8.003 0 0 1 20 10z"/>
        </svg>
  
      <span class="logo-name">Rewoven</span>
    </a>

    <nav class="nav-links">
      <a href="index.html" class="active">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="mapa.html">Mapa</a>
      <a href="equipe.html">Equipe</a>
      <a href="cadastro.html" class="btn-nav">Cadastrar</a>
    </nav>




  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="badge">
      <span class="badge-dot"></span>
      Projeto para Maratona Tech 2026


    <h1>
      Descarte seu lixo eletrônico
      <span class="accent">de forma consciente</span>
    </h1>

    <p class="hero-sub">
      Encontre pontos de coleta próximos a você e contribua para um planeta mais sustentável.
      Juntos, podemos dar um destino correto aos resíduos eletrônicos.
    </p>

    <div class="search-box">
      <div class="search-input-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <input type="text" placeholder="Digite seu endereço ou CEP..." />
  
      <button class="btn-buscar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Buscar
      </button>


    <a class="btn-mapa" href="mapa.html">
      Ver Mapa Completo
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </section>

</body>
</html>
